<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pekadi Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="icon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <div class="social-links header-row">
      <div class="icon-row">
        <a class="btn btn-small" href="index.html">Home</a>
        <a href="https://www.instagram.com/pekadi"><img src="instagram.png" class="social-icon" alt="Instagram"></a>
        <a href="https://github.com/Pekadii"><img src="github.png" class="social-icon" alt="GitHub"></a>
        <a href="https://discord.com/invite/h5EBn2zKBu"><img src="discord.png" class="social-icon" alt="Discord"></a>
      </div>
    </div>
  </header>

  <section class="portfolio-hero">
    <p class="contact-kicker">Pekadi Portfolio</p>
    <h1>Landscape & Subject Portraits</h1>
    <p>Night scenes, cinematic tones, portraits & landscapes, also street-inspired photography.</p>
  </section>

  <section class="portfolio-section" id="landscape">
    <h2>Landscape / Street / Portraits</h2>
    <div class="gallery-grid">
      <div class="tile"><img src="Train-2.jpg" alt="Night train station photo"></div>
      <div class="tile"><img src="Train-1.jpg" alt="MBTA train at night"></div>
      <div class="tile tile-tall"><img src="Landscape.jpg" alt="Train platform lights"></div>
      <div class="tile"><img src="Train-3.jpg" alt="Train in motion"></div>
    </div>
  </section>

  <section class="portfolio-section" id="portraits">
    <h2>Subject Portraits</h2>
    <div class="gallery-grid">
      <div class="tile tile-tall"><img src="Portraits-1.jpg" alt="Cinematic night portrait"></div>
      <div class="tile tile-tall"><img src="Portraits-2.jpg" alt="Close-up portrait"></div>
      <div class="tile tile-tall"><img src="Portraits-3.jpg" alt="Moody portrait lighting"></div>
      <div class="tile tile-tall"><img src="Portraits-4.jpg" alt="Side profile portrait"></div>
      <div class="tile tile-tall"><img src="Portraits-5.jpg" alt="Late night portrait"></div>
    </div>
  </section>

  <footer>
    <p>Copyright © 2025 - Pekadi Photography - All rights reserved.</p>
  </footer>
</body>
</html>
