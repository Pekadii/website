<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presets - Pekadi</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="icon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&amp;family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="site-nav header-row">
      <button class="menu-toggle" type="button" aria-label="Open site menu" aria-expanded="false" aria-controls="siteMenu" data-menu-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="icon-row">
        <a href="https://www.instagram.com/pekadi"><img src="instagram.png" class="social-icon" alt="Instagram"></a>
      </div>
    </div>

    <div class="site-menu" id="siteMenu" hidden data-site-menu>
      <button class="site-menu-backdrop" type="button" aria-label="Close site menu" data-menu-close></button>
      <nav class="site-menu-panel" aria-label="Site menu">
        <a href="/"><strong>Home</strong></a>
        <a href="/Presets/"><strong>Presets</strong></a>
        <a href="/about-me/"><strong>About Me</strong></a>
        <a href="/My-Gear/"><strong>My Gear</strong></a>
      </nav>
    </div>
  </header>

  <main class="page-main">


  <section class="ba-gallery" id="gallery">
  <div class="ba-grid">
  
    <div class="ba-copy">
      <div class="ba-icon">🖥️</div>
      <h2>Transform your photos with presets - lightroom editing.</h2>
      <p>Real examples using the presets and editing to enhance your photos.</p>
    </div>

  
    <div class="ba-card">
      <div class="ba-stage" id="baStage">
      
      </div>

      <div class="ba-ui">
        <button class="ba-nav ba-prev" type="button" aria-label="Previous">‹</button>
        <div class="ba-count" id="baCount">1 / 1</div>
        <button class="ba-nav ba-next" type="button" aria-label="Next">›</button>
      </div>
    </div>
  </div>
</section>
  </main>
  <footer>
    <nav class="footer-links" aria-label="Footer links">
      <a href="https://pekadi.com/support">Support</a>
      <a href="https://pekadi.com/privacy">Privacy Policy</a>
    </nav>
    <p>Copyright © 2025 - Pekadi Photography - All rights reserved.</p>
  </footer>


<script>
  (function(){
    const toggle = document.querySelector("[data-menu-toggle]");
    const menu = document.querySelector("[data-site-menu]");
    if(!toggle || !menu) return;

    const closers = menu.querySelectorAll("[data-menu-close]");

    function openMenu(){
      menu.hidden = false;
      toggle.setAttribute("aria-expanded", "true");
      document.body.classList.add("site-menu-open");
    }

    function closeMenu(){
      menu.hidden = true;
      toggle.setAttribute("aria-expanded", "false");
      document.body.classList.remove("site-menu-open");
    }

    toggle.addEventListener("click", () => {
      if(menu.hidden) openMenu();
      else closeMenu();
    });

    closers.forEach((closer) => closer.addEventListener("click", closeMenu));

    document.addEventListener("keydown", (event) => {
      if(event.key === "Escape" && !menu.hidden){
        closeMenu();
      }
    });
  })();
</script>
<script src="ba-gallery.js"></script>
</body>
</html>
