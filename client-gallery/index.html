<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Client Gallery | Pekadi</title>
  <link rel="preload" as="image" href="optimized/portfolio/Fall-River-hero.jpg" fetchpriority="high" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="assets/ico/icon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&amp;family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet">
</head>

<body>
  <header class="photography-header">
    <div class="photography-nav">
      <button class="menu-toggle" type="button" aria-label="Open site menu" aria-expanded="false" aria-controls="siteMenu" data-menu-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="icon-row photography-socials">
        <a href="https://www.instagram.com/pekadi"><img src="assets/png/instagram.png" class="social-icon" alt="Instagram"></a>
      </div>
    </div>

    <div class="site-menu" id="siteMenu" hidden data-site-menu>
      <button class="site-menu-backdrop" type="button" aria-label="Close site menu" data-menu-close></button>
      <nav class="site-menu-panel" aria-label="Site menu">
        <a href="/"><strong>Home</strong></a>
        <a href="/photography/"><strong>Portfolio</strong></a>
        <a href="/client-gallery/"><strong>Gallery</strong></a>
        <a href="/Presets/"><strong>Presets</strong></a>
        <a href="/about-me/"><strong>About Me</strong></a>
        <a href="/My-Gear/"><strong>My Gear</strong></a>
      </nav>
    </div>
  </header>

  <main>
    <section class="client-gallery-hero" aria-labelledby="clientGalleryTitle">
      <img class="client-gallery-hero-image" src="optimized/portfolio/Fall-River-hero.jpg" alt="" aria-hidden="true" fetchpriority="high" decoding="async">
      <div class="client-gallery-hero-copy">
        <p class="client-gallery-kicker">Pekadi Client Gallery</p>
        <h1 id="clientGalleryTitle">Photoshoot Delivery</h1>
        <p>Private session folders for previewing and downloading delivered photos.</p>
      </div>
    </section>

    <section class="client-gallery-shell" aria-label="Recent public galleries">
      <div class="client-gallery-head">
        <h2>Public Galleries.</h2>
        <div class="client-gallery-actions">
          <button class="client-area-toggle" type="button" aria-expanded="false" aria-controls="clientAreaSessions" data-client-area-toggle>
            Client Area
          </button>
        </div>
      </div>

      <div class="client-session-grid" data-public-session-grid></div>
    </section>

    <section class="client-gallery-shell client-area-shell" id="clientAreaSessions" data-client-area-section hidden aria-label="Private client gallery sessions">
      <div class="client-gallery-head">
        <p class="client-gallery-kicker">Client Area</p>
        <h2>Client gallery sessions.</h2>
      </div>

      <div class="client-session-grid" data-client-session-grid></div>
    </section>

    <section class="client-unlocked" data-unlocked-gallery hidden aria-live="polite"></section>
  </main>

  <footer>
    <p>Copyright © 2025 - Pekadi Photography - All rights reserved.</p>
  </footer>

  <script>
    const DOWNLOAD_GATE_ENDPOINT = "https://pekadi-download-gate.theofficialaustinrath.workers.dev";

    const CLIENT_SESSIONS = [
      {
        id: "nathan-portraits",
        title: "Nathan Portrait Session",
        date: "May 2026",
        folder: "client-galleries/nathan-portraits",
        cover: "client-galleries/nathan-portraits/previews/nathan-03.jpg"
      },
      {
        id: "graduation",
        title: "Graduation Session",
        date: "June 2026",
        folder: "client-galleries/Graduation",
        cover: "client-galleries/Graduation/previews/graduation-01.jpg"
      },
      {
        id: "family-2026",
        title: "Family 2026",
        date: "June 2026",
        folder: "client-galleries/Family",
        cover: "client-galleries/Family/previews/family-05.jpg",
        manifest: "client-galleries/Family/Family2026.json",
        public: true
      },
      {
        id: "adventure-2024",
        title: "Adventure 2024",
        date: "June 2024",
        folder: "client-galleries/Adventure",
        cover: "client-galleries/Adventure/previews/adventure-25.jpg",
        manifest: "client-galleries/Adventure/Adventure2024.json",
        public: true
      },
      {
        id: "newyork-2025",
        title: "New York 2025",
        date: "Sep 2025",
        folder: "client-galleries/NewYork",
        cover: "client-galleries/NewYork/previews/newyork-01.jpg",
        manifest: "client-galleries/NewYork/NewYork2025.json",
        public: true
      }

    ];

    (function(){
      const publicGrid = document.querySelector("[data-public-session-grid]");
      const clientGrid = document.querySelector("[data-client-session-grid]");
      const clientAreaSection = document.querySelector("[data-client-area-section]");
      const unlocked = document.querySelector("[data-unlocked-gallery]");
      const clientAreaToggle = document.querySelector("[data-client-area-toggle]");
      if(!publicGrid || !clientGrid || !unlocked) return;

      let clientAreaOpen = false;

      function getScrollBehavior(){
        return "auto";
      }

      function cleanCode(value){
        return value.trim().replace(/[^a-zA-Z0-9_-]/g, "");
      }

      function escapeHtml(value){
        return String(value ?? "").replace(/[&<>"']/g, (character) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[character]));
      }

      function escapeAttribute(value){
        return escapeHtml(value);
      }

      function escapeCssUrl(value){
        return String(value ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
      }

      function cleanAspectRatio(value){
        return /^\d+(?:\.\d+)?\s*\/\s*\d+(?:\.\d+)?$/.test(value || "") ? value : "4 / 5";
      }

      function cleanPreviewFit(value){
        return value === "contain" ? "contain" : "cover";
      }

      function showEmptyState(target, title = "Client folders will appear here after a session is ready."){
        if(!target) return;
        target.innerHTML = `
          <article class="client-session-empty">
            <p class="client-gallery-kicker">No Active Deliveries</p>
            <h3>${escapeHtml(title)}</h3>
          </article>
        `;
      }

      function showPublicEmptyState(target){
        if(!target) return;
        target.innerHTML = `
          <article class="client-session-empty">
            <p class="client-gallery-kicker">No Public Galleries</p>
            <h3>Recent public galleries will appear here.</h3>
          </article>
        `;
      }

      function toRootPath(path){
        if(!path || /^(https?:)?\/\//i.test(path) || path.startsWith("/")) return path;
        return `/${path}`;
      }

      function renderSessionGrid(target, sessions){
        if(!target) return;

        if(!sessions.length){
          target === publicGrid ? showPublicEmptyState(target) : showEmptyState(target);
          return;
        }

        target.innerHTML = sessions.map((session) => `
          <article class="client-session-card" data-session-id="${escapeAttribute(session.id)}" data-session-visibility="${session.public ? "public" : "client"}">
            ${session.cover ? `<div class="client-session-cover" style="background-image: url('${escapeCssUrl(toRootPath(session.cover))}')" role="img" aria-label="${escapeAttribute(session.title || "Client session cover")}" oncontextmenu="return false;"></div>` : `<div class="client-session-cover client-session-cover-empty" aria-hidden="true"></div>`}
            <div class="client-session-copy">
              <p class="client-gallery-kicker">${escapeHtml(session.date || "Client Session")}</p>
              <h3>${escapeHtml(session.title)}</h3>
              ${session.public ? `
                <div class="client-code-form">
                  <label>Public Gallery</label>
                  <div class="client-code-row">
                    <button class="btn btn-small" type="button" data-public-gallery>View Gallery</button>
                  </div>
                  <p class="client-code-status" data-code-status></p>
                </div>
              ` : `
                <form class="client-code-form" data-code-form>
                  <label for="${escapeAttribute(session.id)}-code">Access Code</label>
                  <div class="client-code-row">
                    <input id="${escapeAttribute(session.id)}-code" name="code" type="password" autocomplete="off" inputmode="text" required>
                    <button class="btn btn-small" type="submit">Unlock</button>
                  </div>
                  <p class="client-code-status" data-code-status></p>
                </form>
              `}
            </div>
          </article>
        `).join("");

        target.querySelectorAll("[data-code-form]").forEach((form) => {
          form.addEventListener("submit", unlockSession);
        });

        target.querySelectorAll("[data-public-gallery]").forEach((button) => {
          button.addEventListener("click", loadPublicSession);
        });

        target.querySelectorAll(".client-session-cover").forEach((cover) => {
          cover.addEventListener("contextmenu", (event) => event.preventDefault());
          cover.addEventListener("dragstart", (event) => event.preventDefault());
        });
      }

      function renderSessions(){
        renderSessionGrid(publicGrid, CLIENT_SESSIONS.filter((session) => session.public));
        renderSessionGrid(clientGrid, CLIENT_SESSIONS.filter((session) => !session.public));
      }

      function updateClientAreaToggle(){
        if(clientAreaSection) clientAreaSection.hidden = !clientAreaOpen;
        if(!clientAreaToggle) return;
        clientAreaToggle.setAttribute("aria-expanded", String(clientAreaOpen));
        clientAreaToggle.classList.toggle("is-active", clientAreaOpen);
      }

      if(clientAreaToggle){
        clientAreaToggle.addEventListener("click", () => {
          clientAreaOpen = !clientAreaOpen;
          updateClientAreaToggle();
          if(clientAreaOpen && clientAreaSection){
            clientAreaSection.scrollIntoView({ behavior: getScrollBehavior(), block: "start" });
          }
        });
      }

      async function loadPublicSession(event){
        const card = event.currentTarget.closest("[data-session-id]");
        const session = CLIENT_SESSIONS.find((item) => item.id === card.dataset.sessionId);
        const status = card.querySelector("[data-code-status]");

        if(!session || !session.manifest){
          status.textContent = "This gallery is not available yet.";
          return;
        }

        status.textContent = "Opening gallery...";

        try{
          const response = await fetch(session.manifest, { cache: "no-store" });
          if(!response.ok) throw new Error("missing");
          const manifest = await response.json();
          renderUnlocked(session, manifest);
          status.textContent = "Gallery opened.";
        }catch(error){
          status.textContent = "This gallery is not available yet.";
        }
      }

      async function unlockSession(event){
        event.preventDefault();
        const card = event.currentTarget.closest("[data-session-id]");
        const session = CLIENT_SESSIONS.find((item) => item.id === card.dataset.sessionId);
        const status = card.querySelector("[data-code-status]");
        const input = event.currentTarget.elements.code;
        const code = cleanCode(input.value);

        if(!session || !code){
          status.textContent = "Enter the access code for this folder.";
          return;
        }

        status.textContent = "Checking code...";

        try{
          const response = await fetch(`${session.folder}/${code}.json`, { cache: "no-store" });
          if(!response.ok) throw new Error("locked");
          const manifest = await response.json();
          const downloadsReady = await attachPrivateDownloads(session, manifest, code);
          renderUnlocked(session, manifest);
          status.textContent = downloadsReady === false ? "Unlocked. Private downloads need attention." : "Unlocked.";
        }catch(error){
          status.textContent = "That code did not unlock this folder.";
        }
      }

      async function attachPrivateDownloads(session, manifest, code){
        if(!manifest.downloadGate) return true;

        if(!DOWNLOAD_GATE_ENDPOINT){
          manifest.downloads = (Array.isArray(manifest.downloads) ? manifest.downloads : []).map((item) => ({
            ...item,
            href: "",
            detail: "Download gate not connected yet"
          }));
          return false;
        }

        try{
          const response = await fetch(DOWNLOAD_GATE_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sessionId: session.id,
              code
            })
          });

          if(!response.ok){
            let message = `download gate returned ${response.status}`;
            try{
              const errorPayload = await response.json();
              if(errorPayload && errorPayload.error) message += `: ${errorPayload.error}`;
            }catch(error){}
            throw new Error(message);
          }

          const payload = await response.json();
          if(Array.isArray(payload.downloads)){
            manifest.downloads = payload.downloads;
          }
          return true;
        }catch(error){
          console.error("Private download lookup failed", error);
          manifest.downloads = (Array.isArray(manifest.downloads) ? manifest.downloads : []).map((item) => ({
            ...item,
            href: "",
            detail: `Private download lookup failed${error.message ? `: ${error.message}` : ""}`
          }));
          return false;
        }
      }

      function renderUnlocked(session, manifest){
        const previews = Array.isArray(manifest.previews) ? manifest.previews : [];
        const downloads = Array.isArray(manifest.downloads) ? manifest.downloads : [];
        const isUrl = (value) => /^https?:\/\//i.test(value || "");
        const getDownloadHref = (item) => item.href || item.url || (isUrl(item.detail) ? item.detail : "");
        const getDownloadDetail = (item) => {
          if(item.displayDetail) return item.displayDetail;
          if(item.detail && !isUrl(item.detail)) return item.detail;
          return getDownloadHref(item) ? "Open private download" : "Shared privately";
        };

        unlocked.hidden = false;
        unlocked.innerHTML = `
          <div class="client-unlocked-head">
            <p class="client-gallery-kicker">${escapeHtml(manifest.date || session.date || "Unlocked")}</p>
            <h2>${escapeHtml(manifest.title || session.title)}</h2>
            ${manifest.note ? `<p>${escapeHtml(manifest.note)}</p>` : ""}
          </div>

          ${downloads.length ? `
            <div class="client-download-row">
              ${downloads.map((item) => `
                ${getDownloadHref(item) ? `<a class="client-download-card" href="${escapeAttribute(getDownloadHref(item))}" target="_blank" rel="noopener noreferrer">` : `<div class="client-download-card client-download-card-disabled" aria-disabled="true">`}
                  <span>${escapeHtml(item.label || "Download Photos")}</span>
                  <strong>${escapeHtml(getDownloadDetail(item))}</strong>
                ${getDownloadHref(item) ? `</a>` : `</div>`}
              `).join("")}
            </div>
          ` : ""}

          ${previews.length ? `
            <div class="client-preview-grid">
              ${previews.map((photo) => `
                <figure class="client-preview-tile" style="--client-preview-aspect: ${cleanAspectRatio(photo.aspectRatio)}; --client-preview-fit: ${cleanPreviewFit(photo.fit)};" oncontextmenu="return false;">
                  <img class="client-preview-image" src="${escapeAttribute(toRootPath(photo.src))}" alt="${escapeAttribute(photo.alt || "Client gallery preview")}" loading="lazy" decoding="async" draggable="false">
                </figure>
              `).join("")}
            </div>
          ` : ""}
        `;

        unlocked.querySelectorAll(".client-preview-grid, .client-preview-tile, .client-preview-image").forEach((element) => {
          element.addEventListener("contextmenu", (event) => event.preventDefault());
          element.addEventListener("dragstart", (event) => event.preventDefault());
        });

        unlocked.scrollIntoView({ behavior: getScrollBehavior(), block: "start" });
      }

      updateClientAreaToggle();
      renderSessions();
    })();
  </script>

  <script>
    (function(){
      const toggle = document.querySelector("[data-menu-toggle]");
      const menu = document.querySelector("[data-site-menu]");
      if(!toggle || !menu) return;

      const closers = menu.querySelectorAll("[data-menu-close]");

      function openMenu(){
        menu.hidden = false;
        toggle.setAttribute("aria-expanded", "true");
        document.body.classList.add("site-menu-open");
      }

      function closeMenu(){
        menu.hidden = true;
        toggle.setAttribute("aria-expanded", "false");
        document.body.classList.remove("site-menu-open");
      }

      toggle.addEventListener("click", () => {
        if(menu.hidden) openMenu();
        else closeMenu();
      });

      closers.forEach((closer) => closer.addEventListener("click", closeMenu));

      document.addEventListener("keydown", (event) => {
        if(event.key === "Escape" && !menu.hidden){
          closeMenu();
        }
      });
    })();
  </script>
</body>
</html>
